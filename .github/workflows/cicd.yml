name: CI/CD Pipeline

# Required GitHub Secrets:
# - RENDER_DEPLOY_HOOK_URL: Deploy hook URL from Render service settings (fire-and-forget deployment)
#
# Required Firebase Credentials (add ONE of these options):
# Option 1 (Recommended):
#   - FIREBASE_SERVICE_ACCOUNT_KEY: Full Firebase service account JSON
# Option 2 (Individual fields):
#   - FIREBASE_PROJECT_ID: Firebase project ID
#   - FIREBASE_PRIVATE_KEY: Firebase service account private key
#   - FIREBASE_CLIENT_EMAIL: Firebase service account email
#
# Note: Firebase credentials MUST ALSO be configured in Render Dashboard → Environment.
# GitHub Secrets are used for CI/CD validation only. The actual values used at runtime
# come from Render environment variables.
#
# Note: All environment variables (database, API keys, etc.) should be configured directly
# in Render Dashboard → Service Settings → Environment. They are NOT synced via CI/CD.
#
# Optional GitHub Secrets (for payment tests):
# - MP_TEST_ACCESS_TOKEN: MercadoPago test access token (TEST-...)
# - MP_TEST_PUBLIC_KEY: MercadoPago test public key (TEST-...)
# - MP_WEBHOOK_SECRET: MercadoPago webhook secret

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - quality-checks
          - payment-tests
          - build-backend
          - deploy-backend
          - build-mobile
      platform:
        description: 'Mobile platform (for build-mobile job)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: 'Build profile (for build-mobile job)'
        required: false
        default: 'production'
        type: choice
        options:
          - development
          - preview
          - production

env:
  NODE_VERSION: '18'
  RENDER_API_URL: 'https://api.render.com/v1'

jobs:
  # ============================
  # Quality Checks - Always runs
  # ============================
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'quality-checks'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
            backend/strapi/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend/strapi
        run: npm ci

      - name: Run frontend linting
        run: npm run lint

      - name: Run frontend type checking
        run: npm run typecheck

      - name: Run frontend tests
        run: npm run test:ci
        env:
          NODE_ENV: test

      - name: Run backend linting
        working-directory: backend/strapi
        run: npm run lint || echo "Backend linting not configured"

      - name: Run backend tests
        working-directory: backend/strapi
        run: npm run test:ci
        env:
          NODE_ENV: test
          # Dummy values for build - same as build-backend job
          APP_KEYS: build-key-1,build-key-2,build-key-3,build-key-4
          JWT_SECRET: build-jwt-secret
          API_TOKEN_SALT: build-api-token-salt
          ADMIN_JWT_SECRET: build-admin-jwt-secret
          TRANSFER_TOKEN_SALT: build-transfer-token-salt

      - name: Upload test coverage
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info,./backend/strapi/coverage/lcov.info
          flags: frontend,backend
          fail_ci_if_error: false

  # ============================
  # Payment Tests - Conditional
  # ============================
  payment-tests:
    name: Payment Integration Tests
    runs-on: ubuntu-latest
    needs: quality-checks
    if: |
      (github.event_name == 'push' || github.event_name == 'pull_request') &&
      (contains(github.event.head_commit.message, '[payment]') ||
       contains(github.event.head_commit.message, '[mercadopago]') ||
       github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.job == 'all' || github.event.inputs.job == 'payment-tests'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for MercadoPago credentials
        id: check-credentials
        run: |
          if [ -z "${{ secrets.MP_TEST_ACCESS_TOKEN }}" ]; then
            echo "WARNING: MercadoPago test credentials not configured"
            echo "has-credentials=false" >> $GITHUB_OUTPUT
          else
            echo "MercadoPago test credentials found"
            echo "has-credentials=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check-credentials.outputs.has-credentials == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        if: steps.check-credentials.outputs.has-credentials == 'true'
        run: npm ci

      - name: Run payment tests
        if: steps.check-credentials.outputs.has-credentials == 'true'
        run: |
          echo "Running payment integration tests..."
          npm run test:payment || echo "Payment tests not configured"
        env:
          MP_TEST_ACCESS_TOKEN: ${{ secrets.MP_TEST_ACCESS_TOKEN }}
          MP_TEST_PUBLIC_KEY: ${{ secrets.MP_TEST_PUBLIC_KEY }}
          MP_WEBHOOK_SECRET: ${{ secrets.MP_WEBHOOK_SECRET }}
          NODE_ENV: test

      - name: Test webhook endpoints
        if: steps.check-credentials.outputs.has-credentials == 'true'
        working-directory: backend/strapi
        run: |
          echo "Testing MercadoPago webhook endpoints..."
          npm run test:webhooks || echo "Webhook tests not configured"
        env:
          MP_WEBHOOK_SECRET: ${{ secrets.MP_WEBHOOK_SECRET }}
          NODE_ENV: test

      - name: Skip message
        if: steps.check-credentials.outputs.has-credentials == 'false'
        run: |
          echo "Skipping payment tests - MercadoPago credentials not configured"
          echo "Add MP_TEST_ACCESS_TOKEN, MP_TEST_PUBLIC_KEY, and MP_WEBHOOK_SECRET to GitHub Secrets to enable"

  # ============================
  # Build Backend
  # ============================
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [quality-checks]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.job == 'all' ||
        github.event.inputs.job == 'build-backend' ||
        github.event.inputs.job == 'deploy-backend'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: backend/strapi
        run: npm ci

      - name: Build Strapi
        working-directory: backend/strapi
        run: |
          echo "Building Strapi for production..."
          npm run build
        env:
          NODE_ENV: production
          # Use test keys for build verification
          APP_KEYS: build-key-1,build-key-2,build-key-3,build-key-4
          JWT_SECRET: build-jwt-secret
          API_TOKEN_SALT: build-api-token-salt
          ADMIN_JWT_SECRET: build-admin-jwt-secret
          TRANSFER_TOKEN_SALT: build-transfer-token-salt

      - name: Verify build
        working-directory: backend/strapi
        run: |
          if [ ! -d "dist" ] && [ ! -d "build" ]; then
            echo "ERROR: Build directory not found"
            exit 1
          fi
          echo "✅ Backend build completed successfully"

      - name: Check build size
        working-directory: backend/strapi
        run: |
          echo "Build size report:"
          du -sh dist 2>/dev/null || du -sh build 2>/dev/null || echo "Build directory not found"

  # ============================
  # Deploy Backend to Render
  # ============================
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: build-backend
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.job == 'all' || github.event.inputs.job == 'deploy-backend'))

    environment:
      name: production
      url: https://tifossi-strapi-backend.onrender.com

    steps:
      - name: Validate deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "❌ ERROR: RENDER_DEPLOY_HOOK_URL secret not configured"
            echo ""
            echo "To set up the deploy hook:"
            echo "1. Go to Render Dashboard → Your Service → Settings"
            echo "2. Find the 'Deploy Hook' section"
            echo "3. Copy the deploy hook URL"
            echo "4. Add it as a GitHub Secret named RENDER_DEPLOY_HOOK_URL"
            echo ""
            echo "Note: Environment variables should be configured directly in Render Dashboard"
            exit 1
          fi

          echo "✅ Deploy hook configured"

      - name: Validate Firebase credentials
        run: |
          echo "Validating Firebase Admin credentials..."
          echo ""

          MISSING_SECRETS=()

          # Check for Firebase credentials (Option 1: Full JSON)
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}" ]; then
            # Check for Firebase credentials (Option 2: Individual fields)
            if [ -z "${{ secrets.FIREBASE_PROJECT_ID }}" ]; then
              MISSING_SECRETS+=("FIREBASE_PROJECT_ID")
            fi
            if [ -z "${{ secrets.FIREBASE_PRIVATE_KEY }}" ]; then
              MISSING_SECRETS+=("FIREBASE_PRIVATE_KEY")
            fi
            if [ -z "${{ secrets.FIREBASE_CLIENT_EMAIL }}" ]; then
              MISSING_SECRETS+=("FIREBASE_CLIENT_EMAIL")
            fi
          fi

          if [ ${#MISSING_SECRETS[@]} -gt 0 ] && [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}" ]; then
            echo "❌ ERROR: Firebase Admin credentials not configured"
            echo ""
            echo "Firebase credentials are REQUIRED for authentication to work."
            echo "The /auth/firebase-exchange endpoint needs these to verify mobile app tokens."
            echo ""
            echo "Missing secrets: ${MISSING_SECRETS[*]}"
            echo ""
            echo "To configure Firebase credentials, add ONE of these options:"
            echo ""
            echo "Option 1 (Recommended) - Add to GitHub Secrets AND Render Environment:"
            echo "  FIREBASE_SERVICE_ACCOUNT_KEY='{\"type\":\"service_account\",\"project_id\":\"...\"}'"
            echo ""
            echo "Option 2 - Add individual fields to GitHub Secrets AND Render Environment:"
            echo "  FIREBASE_PROJECT_ID=your-project-id"
            echo "  FIREBASE_PRIVATE_KEY=-----BEGIN PRIVATE KEY-----\\n..."
            echo "  FIREBASE_CLIENT_EMAIL=firebase-adminsdk-xxxxx@your-project.iam.gserviceaccount.com"
            echo ""
            echo "To get these credentials:"
            echo "1. Go to Firebase Console → Project Settings → Service Accounts"
            echo "2. Click 'Generate new private key'"
            echo "3. Download the JSON file"
            echo "4. Add the values to BOTH GitHub Secrets AND Render Dashboard Environment"
            echo ""
            exit 1
          fi

          echo "✅ Firebase Admin credentials configured"

      - name: Deploy to Render
        run: |
          echo "Triggering deployment to Render..."
          echo "Service: https://tifossi-strapi-backend.onrender.com"
          echo ""

          # Trigger deployment using deploy hook (fire and forget)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")

          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ] || [ "$HTTP_CODE" -eq 202 ]; then
            echo "✅ Deployment triggered successfully (HTTP $HTTP_CODE)"
            echo ""
            echo "Render is now building and deploying your application."
            echo "This process happens asynchronously and typically takes 5-10 minutes."
            echo ""
            echo "Monitor deployment progress:"
            echo "→ Render Dashboard: https://dashboard.render.com"
            echo "→ Service Logs: https://tifossi-strapi-backend.onrender.com (once live)"
          else
            echo "❌ Failed to trigger deployment (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "======================================"
          echo "DEPLOYMENT SUMMARY"
          echo "======================================"
          echo "Environment: production"
          echo "Service URL: https://tifossi-strapi-backend.onrender.com"
          echo "Status: Deploy triggered (building asynchronously)"
          echo ""
          echo "Next steps:"
          echo "→ Check Render dashboard for build progress"
          echo "→ Verify health endpoint after ~5-10 minutes"
          echo "→ Health check: https://tifossi-strapi-backend.onrender.com/api/health"
          echo "======================================"

  # ============================
  # Build Mobile App
  # ============================
  build-mobile:
    name: Build Mobile App
    runs-on: ubuntu-latest
    needs: quality-checks
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.job == 'all' || github.event.inputs.job == 'build-mobile'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Configure app credentials
        run: |
          echo "Configuring app credentials..."

          # Update app.json with production values if available
          if [ -n "${{ secrets.IOS_BUNDLE_ID }}" ]; then
            npx json -I -f app.json -e "this.expo.ios.bundleIdentifier='${{ secrets.IOS_BUNDLE_ID }}'"
          fi

          if [ -n "${{ secrets.ANDROID_PACKAGE }}" ]; then
            npx json -I -f app.json -e "this.expo.android.package='${{ secrets.ANDROID_PACKAGE }}'"
          fi

          echo "✅ App credentials configured"

      - name: Set build profile
        id: build-config
        run: |
          PLATFORM="${{ github.event.inputs.platform || 'all' }}"
          PROFILE="${{ github.event.inputs.profile || 'production' }}"

          echo "platform=$PLATFORM" >> $GITHUB_OUTPUT
          echo "profile=$PROFILE" >> $GITHUB_OUTPUT

          echo "Building for platform: $PLATFORM"
          echo "Using profile: $PROFILE"

      - name: Build iOS app
        if: |
          steps.build-config.outputs.platform == 'all' ||
          steps.build-config.outputs.platform == 'ios'
        run: |
          echo "Building iOS app..."
          eas build --platform ios \
            --profile ${{ steps.build-config.outputs.profile }} \
            --non-interactive \
            --no-wait || {
              echo "Note: EAS build submitted. Check Expo dashboard for status."
            }

      - name: Build Android app
        if: |
          steps.build-config.outputs.platform == 'all' ||
          steps.build-config.outputs.platform == 'android'
        run: |
          echo "Building Android app..."
          eas build --platform android \
            --profile ${{ steps.build-config.outputs.profile }} \
            --non-interactive \
            --no-wait || {
              echo "Note: EAS build submitted. Check Expo dashboard for status."
            }

      - name: Submit to app stores
        if: |
          github.event_name == 'push' &&
          startsWith(github.ref, 'refs/tags/v') &&
          steps.build-config.outputs.profile == 'production'
        run: |
          echo "Preparing store submission..."

          # Submit to TestFlight
          if [ "${{ steps.build-config.outputs.platform }}" = "all" ] || [ "${{ steps.build-config.outputs.platform }}" = "ios" ]; then
            echo "Submitting to TestFlight..."
            eas submit --platform ios --latest || echo "iOS submission requires manual review"
          fi

          # Submit to Google Play
          if [ "${{ steps.build-config.outputs.platform }}" = "all" ] || [ "${{ steps.build-config.outputs.platform }}" = "android" ]; then
            echo "Submitting to Google Play..."
            eas submit --platform android --latest || echo "Android submission requires manual review"
          fi

      - name: Build summary
        if: always()
        run: |
          echo "======================================"
          echo "MOBILE BUILD SUMMARY"
          echo "======================================"
          echo "Platform: ${{ steps.build-config.outputs.platform }}"
          echo "Profile: ${{ steps.build-config.outputs.profile }}"
          echo "Check Expo dashboard for build status"
          echo "======================================"

  # ============================
  # Notification Job
  # ============================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [quality-checks, payment-tests, build-backend, deploy-backend, build-mobile]
    if: always()

    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.quality-checks.result }}" = "failure" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "message=Quality checks failed" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy-backend.result }}" = "failure" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "message=Backend deployment failed" >> $GITHUB_OUTPUT
          elif [ "${{ needs.build-mobile.result }}" = "failure" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "message=Mobile build failed" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=Pipeline completed successfully" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ steps.status.outputs.status }}"
          MESSAGE="${{ steps.status.outputs.message }}"
          COLOR=$([ "$STATUS" = "success" ] && echo "good" || echo "danger")

          curl -X POST $SLACK_WEBHOOK_URL \
            -H 'Content-Type: application/json' \
            -d "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"title\": \"CI/CD Pipeline: $STATUS\",
                \"text\": \"$MESSAGE\",
                \"fields\": [
                  {\"title\": \"Repository\", \"value\": \"${{ github.repository }}\", \"short\": true},
                  {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"${{ github.sha }}\", \"short\": false},
                  {\"title\": \"Author\", \"value\": \"${{ github.actor }}\", \"short\": true}
                ]
              }]
            }" || echo "Slack notification not configured"

      - name: Create GitHub summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Checks | ${{ needs.quality-checks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Payment Tests | ${{ needs.payment-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Backend | ${{ needs.build-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Backend | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Mobile | ${{ needs.build-mobile.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status**: ${{ steps.status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
