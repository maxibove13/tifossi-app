name: CI/CD Pipeline

# Required GitHub Secrets:
# - RENDER_SERVICE_ID: Render service ID (srv-...)
# - RENDER_API_KEY: Render API key for deployments
# - DATABASE_URL: PostgreSQL external connection string (with .oregon-postgres.render.com)
# - DATABASE_CLIENT: Database client type (postgres)
# - DATABASE_SSL: Enable SSL for database (true)
# - DATABASE_SSL_REJECT_UNAUTHORIZED: Reject unauthorized SSL certificates (false)
# - CLOUDINARY_NAME: Cloudinary cloud name
# - CLOUDINARY_KEY: Cloudinary API key
# - CLOUDINARY_SECRET: Cloudinary API secret
# - MP_TEST_ACCESS_TOKEN: MercadoPago test access token (TEST-...)
# - MP_TEST_PUBLIC_KEY: MercadoPago test public key (TEST-...)
# - MP_WEBHOOK_SECRET: MercadoPago webhook secret
# - WEBHOOK_URL: Webhook URL for MercadoPago notifications

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - quality-checks
          - payment-tests
          - build-backend
          - deploy-backend
          - build-mobile
      platform:
        description: 'Mobile platform (for build-mobile job)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: 'Build profile (for build-mobile job)'
        required: false
        default: 'production'
        type: choice
        options:
          - development
          - preview
          - production

env:
  NODE_VERSION: '18'
  RENDER_API_URL: 'https://api.render.com/v1'

jobs:
  # ============================
  # Quality Checks - Always runs
  # ============================
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'quality-checks'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
            backend/strapi/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend/strapi
        run: npm ci

      - name: Run frontend linting
        run: npm run lint

      - name: Run frontend type checking
        run: npm run typecheck

      - name: Run frontend tests
        run: npm run test:ci
        env:
          NODE_ENV: test

      - name: Run backend linting
        working-directory: backend/strapi
        run: npm run lint || echo "Backend linting not configured"

      - name: Run backend tests
        working-directory: backend/strapi
        run: npm run test:ci
        env:
          NODE_ENV: test

      - name: Upload test coverage
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info,./backend/strapi/coverage/lcov.info
          flags: frontend,backend
          fail_ci_if_error: false

  # ============================
  # Payment Tests - Conditional
  # ============================
  payment-tests:
    name: Payment Integration Tests
    runs-on: ubuntu-latest
    needs: quality-checks
    if: |
      (github.event_name == 'push' || github.event_name == 'pull_request') &&
      (contains(github.event.head_commit.message, '[payment]') ||
       contains(github.event.head_commit.message, '[mercadopago]') ||
       github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.job == 'all' || github.event.inputs.job == 'payment-tests'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for MercadoPago credentials
        id: check-credentials
        run: |
          if [ -z "${{ secrets.MP_TEST_ACCESS_TOKEN }}" ]; then
            echo "WARNING: MercadoPago test credentials not configured"
            echo "has-credentials=false" >> $GITHUB_OUTPUT
          else
            echo "MercadoPago test credentials found"
            echo "has-credentials=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check-credentials.outputs.has-credentials == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        if: steps.check-credentials.outputs.has-credentials == 'true'
        run: npm ci

      - name: Run payment tests
        if: steps.check-credentials.outputs.has-credentials == 'true'
        run: |
          echo "Running payment integration tests..."
          npm run test:payment || echo "Payment tests not configured"
        env:
          MP_TEST_ACCESS_TOKEN: ${{ secrets.MP_TEST_ACCESS_TOKEN }}
          MP_TEST_PUBLIC_KEY: ${{ secrets.MP_TEST_PUBLIC_KEY }}
          MP_WEBHOOK_SECRET: ${{ secrets.MP_WEBHOOK_SECRET }}
          NODE_ENV: test

      - name: Test webhook endpoints
        if: steps.check-credentials.outputs.has-credentials == 'true'
        working-directory: backend/strapi
        run: |
          echo "Testing MercadoPago webhook endpoints..."
          npm run test:webhooks || echo "Webhook tests not configured"
        env:
          MP_WEBHOOK_SECRET: ${{ secrets.MP_WEBHOOK_SECRET }}
          NODE_ENV: test

      - name: Skip message
        if: steps.check-credentials.outputs.has-credentials == 'false'
        run: |
          echo "Skipping payment tests - MercadoPago credentials not configured"
          echo "Add MP_TEST_ACCESS_TOKEN, MP_TEST_PUBLIC_KEY, and MP_WEBHOOK_SECRET to GitHub Secrets to enable"

  # ============================
  # Build Backend
  # ============================
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [quality-checks]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.job == 'all' ||
        github.event.inputs.job == 'build-backend' ||
        github.event.inputs.job == 'deploy-backend'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: backend/strapi
        run: npm ci

      - name: Build Strapi
        working-directory: backend/strapi
        run: |
          echo "Building Strapi for production..."
          npm run build
        env:
          NODE_ENV: production
          # Use test keys for build verification
          APP_KEYS: build-key-1,build-key-2,build-key-3,build-key-4
          JWT_SECRET: build-jwt-secret
          API_TOKEN_SALT: build-api-token-salt
          ADMIN_JWT_SECRET: build-admin-jwt-secret

      - name: Verify build
        working-directory: backend/strapi
        run: |
          if [ ! -d "dist" ] && [ ! -d "build" ]; then
            echo "ERROR: Build directory not found"
            exit 1
          fi
          echo "✅ Backend build completed successfully"

      - name: Check build size
        working-directory: backend/strapi
        run: |
          echo "Build size report:"
          du -sh dist 2>/dev/null || du -sh build 2>/dev/null || echo "Build directory not found"

  # ============================
  # Deploy Backend to Render
  # ============================
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: build-backend
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.job == 'all' || github.event.inputs.job == 'deploy-backend'))

    environment:
      name: production
      url: https://tifossi-strapi-backend.onrender.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set deployment environment
        id: set-env
        run: |
          echo "environment=production" >> $GITHUB_OUTPUT
          echo "service_url=https://tifossi-strapi-backend.onrender.com" >> $GITHUB_OUTPUT

      - name: Validate deployment prerequisites
        run: |
          MISSING_SECRETS=()

          # Check for Render credentials
          [ -z "${{ secrets.RENDER_SERVICE_ID }}" ] && MISSING_SECRETS+=("RENDER_SERVICE_ID")
          [ -z "${{ secrets.RENDER_API_KEY }}" ] && MISSING_SECRETS+=("RENDER_API_KEY")

          # Check for Database credentials
          [ -z "${{ secrets.DATABASE_URL }}" ] && MISSING_SECRETS+=("DATABASE_URL")
          [ -z "${{ secrets.DATABASE_CLIENT }}" ] && MISSING_SECRETS+=("DATABASE_CLIENT")
          [ -z "${{ secrets.DATABASE_SSL }}" ] && MISSING_SECRETS+=("DATABASE_SSL")
          [ -z "${{ secrets.DATABASE_SSL_REJECT_UNAUTHORIZED }}" ] && MISSING_SECRETS+=("DATABASE_SSL_REJECT_UNAUTHORIZED")

          # Check for Cloudinary credentials
          [ -z "${{ secrets.CLOUDINARY_NAME }}" ] && MISSING_SECRETS+=("CLOUDINARY_NAME")
          [ -z "${{ secrets.CLOUDINARY_KEY }}" ] && MISSING_SECRETS+=("CLOUDINARY_KEY")
          [ -z "${{ secrets.CLOUDINARY_SECRET }}" ] && MISSING_SECRETS+=("CLOUDINARY_SECRET")

          # Check for MercadoPago credentials (MP_* prefix used by backend)
          [ -z "${{ secrets.MP_TEST_ACCESS_TOKEN }}" ] && MISSING_SECRETS+=("MP_TEST_ACCESS_TOKEN")
          [ -z "${{ secrets.MP_TEST_PUBLIC_KEY }}" ] && MISSING_SECRETS+=("MP_TEST_PUBLIC_KEY")
          [ -z "${{ secrets.MP_WEBHOOK_SECRET }}" ] && MISSING_SECRETS+=("MP_WEBHOOK_SECRET")
          [ -z "${{ secrets.WEBHOOK_URL }}" ] && MISSING_SECRETS+=("WEBHOOK_URL")

          # Check for Strapi security secrets
          [ -z "${{ secrets.APP_KEYS }}" ] && MISSING_SECRETS+=("APP_KEYS")
          [ -z "${{ secrets.API_TOKEN_SALT }}" ] && MISSING_SECRETS+=("API_TOKEN_SALT")
          [ -z "${{ secrets.ADMIN_JWT_SECRET }}" ] && MISSING_SECRETS+=("ADMIN_JWT_SECRET")
          [ -z "${{ secrets.TRANSFER_TOKEN_SALT }}" ] && MISSING_SECRETS+=("TRANSFER_TOKEN_SALT")
          [ -z "${{ secrets.JWT_SECRET }}" ] && MISSING_SECRETS+=("JWT_SECRET")

          if [ ${#MISSING_SECRETS[@]} -ne 0 ]; then
            echo "❌ ERROR: Missing required GitHub Secrets:"
            printf '%s\n' "${MISSING_SECRETS[@]}"
            echo ""
            echo "Please add these secrets to your repository settings"
            echo "Run './scripts/setup-github-secrets.sh' to generate and set Strapi secrets"
            exit 1
          fi

          echo "✅ All required secrets configured"

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Sync environment variables to Render
        run: |
          chmod +x scripts/sync-render-env.sh

          # Export secrets as environment variables for the script
          export DATABASE_URL="${{ secrets.DATABASE_URL }}"
          export DATABASE_CLIENT="${{ secrets.DATABASE_CLIENT }}"
          export DATABASE_SSL="${{ secrets.DATABASE_SSL }}"
          export DATABASE_SSL_REJECT_UNAUTHORIZED="${{ secrets.DATABASE_SSL_REJECT_UNAUTHORIZED }}"
          export CLOUDINARY_NAME="${{ secrets.CLOUDINARY_NAME }}"
          export CLOUDINARY_KEY="${{ secrets.CLOUDINARY_KEY }}"
          export CLOUDINARY_SECRET="${{ secrets.CLOUDINARY_SECRET }}"
          export MP_TEST_ACCESS_TOKEN="${{ secrets.MP_TEST_ACCESS_TOKEN }}"
          export MP_TEST_PUBLIC_KEY="${{ secrets.MP_TEST_PUBLIC_KEY }}"
          export MP_WEBHOOK_SECRET="${{ secrets.MP_WEBHOOK_SECRET }}"
          export WEBHOOK_URL="${{ secrets.WEBHOOK_URL }}"
          export APP_KEYS="${{ secrets.APP_KEYS }}"
          export API_TOKEN_SALT="${{ secrets.API_TOKEN_SALT }}"
          export ADMIN_JWT_SECRET="${{ secrets.ADMIN_JWT_SECRET }}"
          export TRANSFER_TOKEN_SALT="${{ secrets.TRANSFER_TOKEN_SALT }}"
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"

          # Run sync script
          ./scripts/sync-render-env.sh \
            "${{ secrets.RENDER_SERVICE_ID }}" \
            "${{ secrets.RENDER_API_KEY }}"

      - name: Deploy to Render
        id: deploy
        run: |
          echo "Triggering deployment to Render..."

          DEPLOY_RESPONSE=$(curl -s -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json")

          DEPLOY_ID=$(echo "$DEPLOY_RESPONSE" | jq -r '.id')

          if [ -z "$DEPLOY_ID" ] || [ "$DEPLOY_ID" = "null" ]; then
            echo "❌ Failed to trigger deployment"
            echo "$DEPLOY_RESPONSE"
            exit 1
          fi

          echo "✅ Deployment triggered successfully"
          echo "Deploy ID: $DEPLOY_ID"
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT

          # Wait for deployment to complete
          echo "Waiting for deployment to complete..."
          MAX_WAIT=600  # 10 minutes
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            DEPLOY_STATUS=$(curl -s \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.status')

            echo "Status: $DEPLOY_STATUS (${ELAPSED}s elapsed)"

            if [ "$DEPLOY_STATUS" = "live" ]; then
              echo "✅ Deployment completed successfully"
              exit 0
            elif [ "$DEPLOY_STATUS" = "build_failed" ] || [ "$DEPLOY_STATUS" = "deactivated" ]; then
              echo "❌ Deployment failed with status: $DEPLOY_STATUS"
              exit 1
            fi

            sleep 30
            ELAPSED=$((ELAPSED + 30))
          done

          echo "⚠️ Deployment timeout - check Render dashboard"
          exit 1

      - name: Set deployment URL
        id: set-url
        run: |
          echo "service_url=https://tifossi-strapi-backend.onrender.com" >> $GITHUB_OUTPUT

      - name: Verify deployment health
        run: |
          SERVICE_URL="https://tifossi-strapi-backend.onrender.com"

          echo "Verifying deployment health at $SERVICE_URL..."

          # Give the service a moment to stabilize
          sleep 5

          # Check health endpoint
          if curl -f "$SERVICE_URL/api/health" --max-time 10; then
            echo "✅ Health check passed!"
          else
            echo "⚠️ Health check failed - service may still be initializing"
            echo "Check Render dashboard for more details"
            exit 1
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "======================================"
          echo "DEPLOYMENT SUMMARY"
          echo "======================================"
          echo "Environment: production"
          echo "Service URL: https://tifossi-strapi-backend.onrender.com"
          echo "Deployment Status: ${{ steps.deploy.outcome }}"
          echo "======================================"

  # ============================
  # Build Mobile App
  # ============================
  build-mobile:
    name: Build Mobile App
    runs-on: ubuntu-latest
    needs: quality-checks
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.job == 'all' || github.event.inputs.job == 'build-mobile'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Configure app credentials
        run: |
          echo "Configuring app credentials..."

          # Update app.json with production values if available
          if [ -n "${{ secrets.IOS_BUNDLE_ID }}" ]; then
            npx json -I -f app.json -e "this.expo.ios.bundleIdentifier='${{ secrets.IOS_BUNDLE_ID }}'"
          fi

          if [ -n "${{ secrets.ANDROID_PACKAGE }}" ]; then
            npx json -I -f app.json -e "this.expo.android.package='${{ secrets.ANDROID_PACKAGE }}'"
          fi

          echo "✅ App credentials configured"

      - name: Set build profile
        id: build-config
        run: |
          PLATFORM="${{ github.event.inputs.platform || 'all' }}"
          PROFILE="${{ github.event.inputs.profile || 'production' }}"

          echo "platform=$PLATFORM" >> $GITHUB_OUTPUT
          echo "profile=$PROFILE" >> $GITHUB_OUTPUT

          echo "Building for platform: $PLATFORM"
          echo "Using profile: $PROFILE"

      - name: Build iOS app
        if: |
          steps.build-config.outputs.platform == 'all' ||
          steps.build-config.outputs.platform == 'ios'
        run: |
          echo "Building iOS app..."
          eas build --platform ios \
            --profile ${{ steps.build-config.outputs.profile }} \
            --non-interactive \
            --no-wait || {
              echo "Note: EAS build submitted. Check Expo dashboard for status."
            }

      - name: Build Android app
        if: |
          steps.build-config.outputs.platform == 'all' ||
          steps.build-config.outputs.platform == 'android'
        run: |
          echo "Building Android app..."
          eas build --platform android \
            --profile ${{ steps.build-config.outputs.profile }} \
            --non-interactive \
            --no-wait || {
              echo "Note: EAS build submitted. Check Expo dashboard for status."
            }

      - name: Submit to app stores
        if: |
          github.event_name == 'push' &&
          startsWith(github.ref, 'refs/tags/v') &&
          steps.build-config.outputs.profile == 'production'
        run: |
          echo "Preparing store submission..."

          # Submit to TestFlight
          if [ "${{ steps.build-config.outputs.platform }}" = "all" ] || [ "${{ steps.build-config.outputs.platform }}" = "ios" ]; then
            echo "Submitting to TestFlight..."
            eas submit --platform ios --latest || echo "iOS submission requires manual review"
          fi

          # Submit to Google Play
          if [ "${{ steps.build-config.outputs.platform }}" = "all" ] || [ "${{ steps.build-config.outputs.platform }}" = "android" ]; then
            echo "Submitting to Google Play..."
            eas submit --platform android --latest || echo "Android submission requires manual review"
          fi

      - name: Build summary
        if: always()
        run: |
          echo "======================================"
          echo "MOBILE BUILD SUMMARY"
          echo "======================================"
          echo "Platform: ${{ steps.build-config.outputs.platform }}"
          echo "Profile: ${{ steps.build-config.outputs.profile }}"
          echo "Check Expo dashboard for build status"
          echo "======================================"

  # ============================
  # Notification Job
  # ============================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [quality-checks, payment-tests, build-backend, deploy-backend, build-mobile]
    if: always()

    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.quality-checks.result }}" = "failure" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "message=Quality checks failed" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy-backend.result }}" = "failure" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "message=Backend deployment failed" >> $GITHUB_OUTPUT
          elif [ "${{ needs.build-mobile.result }}" = "failure" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "message=Mobile build failed" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=Pipeline completed successfully" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ steps.status.outputs.status }}"
          MESSAGE="${{ steps.status.outputs.message }}"
          COLOR=$([ "$STATUS" = "success" ] && echo "good" || echo "danger")

          curl -X POST $SLACK_WEBHOOK_URL \
            -H 'Content-Type: application/json' \
            -d "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"title\": \"CI/CD Pipeline: $STATUS\",
                \"text\": \"$MESSAGE\",
                \"fields\": [
                  {\"title\": \"Repository\", \"value\": \"${{ github.repository }}\", \"short\": true},
                  {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"${{ github.sha }}\", \"short\": false},
                  {\"title\": \"Author\", \"value\": \"${{ github.actor }}\", \"short\": true}
                ]
              }]
            }" || echo "Slack notification not configured"

      - name: Create GitHub summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Checks | ${{ needs.quality-checks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Payment Tests | ${{ needs.payment-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Backend | ${{ needs.build-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Backend | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Mobile | ${{ needs.build-mobile.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status**: ${{ steps.status.outputs.status }}" >> $GITHUB_STEP_SUMMARY