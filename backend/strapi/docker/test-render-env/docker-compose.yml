version: '3.8'

services:
  # PostgreSQL 16 - matching Render's PostgreSQL version
  postgres:
    image: postgres:16-alpine
    container_name: strapi-test-db
    environment:
      POSTGRES_USER: strapi_user
      POSTGRES_PASSWORD: strapi_password
      POSTGRES_DB: strapi_test
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U strapi_user -d strapi_test']
      interval: 10s
      timeout: 5s
      retries: 5

  # Strapi application - simulating Render's environment
  strapi:
    build:
      context: ../../ # Build from the Strapi root directory
      dockerfile: docker/test-render-env/Dockerfile
    container_name: strapi-test-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Node environment
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337

      # Database configuration (simulating Render's DATABASE_URL)
      DATABASE_URL: postgresql://strapi_user:strapi_password@postgres:5432/strapi_test
      DATABASE_CLIENT: postgres
      DATABASE_SSL: 'false'
      DATABASE_SSL_REJECT_UNAUTHORIZED: 'false'

      # Strapi secrets (auto-generated in Render, hardcoded here for testing)
      APP_KEYS: test-key-1,test-key-2,test-key-3,test-key-4
      API_TOKEN_SALT: test-api-token-salt-12345678
      ADMIN_JWT_SECRET: test-admin-jwt-secret-12345678
      TRANSFER_TOKEN_SALT: test-transfer-token-salt-12345
      JWT_SECRET: test-jwt-secret-1234567890123456

      # Optional configuration
      CORS_ORIGINS: http://localhost:19006,http://localhost:19000
      STRAPI_TELEMETRY_DISABLED: 'true'

    ports:
      - '1337:1337'
    volumes:
      # Mount source code for development testing
      - ../../:/app
      # Preserve node_modules in container
      - /app/node_modules
    command: >
      sh -c "
        echo '=== Starting Strapi Build ===' &&
        npm run build &&
        echo '=== Build Complete, Starting Strapi ===' &&
        npm run start
      "

volumes:
  postgres_data:
    driver: local
