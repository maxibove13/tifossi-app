services:
  # Strapi Backend Service
  - type: web
    name: tifossi-strapi-backend
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: APP_KEYS
        generateValue: true
        sync: false
      - key: API_TOKEN_SALT
        generateValue: true
        sync: false
      - key: ADMIN_JWT_SECRET
        generateValue: true
        sync: false
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
        sync: false
      - key: JWT_SECRET
        generateValue: true
        sync: false
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_SSL
        value: false
      - key: CORS_ORIGINS
        value: https://tifossi.app,https://www.tifossi.app,https://admin.tifossi.app
      - key: UPLOAD_PROVIDER
        value: cloudinary
      - key: RATE_LIMIT_ENABLED
        value: true
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: LOG_LEVEL
        value: warn
      - key: LOG_FORMAT
        value: json
      - key: LOG_FILE_ENABLED
        value: true
      - key: FEATURE_PAYMENTS_ENABLED
        value: true
      - key: FEATURE_EMAIL_NOTIFICATIONS
        value: true
      - key: ADMIN_PANEL_ENABLED
        value: true
      - key: API_DOCUMENTATION_ENABLED
        value: false
      - key: STRAPI_TELEMETRY_DISABLED
        value: true
      - key: GRACEFUL_SHUTDOWN_TIMEOUT
        value: 30000
      - key: MAX_REQUEST_SIZE
        value: 50mb
      - key: UPLOAD_SIZE_LIMIT
        value: 200000000
      - key: HEALTH_CHECK_ENABLED
        value: true
      - key: HEALTH_CHECK_PATH
        value: /api/health
      - key: DEFAULT_CURRENCY
        value: UYU
      - key: DEFAULT_LOCALE
        value: es
      - key: SUPPORTED_LOCALES
        value: es,en,pt
      - key: BUSINESS_NAME
        value: "Tifossi Sport"
      - key: BUSINESS_EMAIL
        value: info@tifossi.com

  # PostgreSQL Database
  - type: pserv
    name: tifossi-postgres
    env: postgres
    plan: starter
    disk:
      name: tifossi-db-disk
      size: 1GB
      mountPath: /var/lib/postgresql/data
    envVars:
      - key: POSTGRES_DB
        value: tifossi_production
      - key: POSTGRES_USER
        value: tifossi_user

  # Redis Cache (Optional)
  - type: redis
    name: tifossi-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

# Environment Variables for External Services
# These need to be configured manually in Render dashboard
# 
# Required Environment Variables:
# - DATABASE_URL (auto-generated by Render PostgreSQL service)
# - CLOUDINARY_NAME (from Cloudinary account)
# - CLOUDINARY_KEY (from Cloudinary account)  
# - CLOUDINARY_SECRET (from Cloudinary account)
# - MERCADO_PAGO_ACCESS_TOKEN (production MercadoPago token)
# - MERCADO_PAGO_PUBLIC_KEY (production MercadoPago public key)
# - MERCADO_PAGO_WEBHOOK_SECRET (webhook secret for MercadoPago)
# - SMTP_HOST (email service host)
# - SMTP_PORT (email service port)
# - SMTP_USERNAME (email service username)
# - SMTP_PASSWORD (email service password)
# - EMAIL_FROM (sender email address)
# - EMAIL_REPLY_TO (reply-to email address)
# - SENTRY_DSN (optional - for error monitoring)
# - REDIS_URL (auto-generated if using Redis service)

# Deployment Configuration
builds:
  - src: .
    buildCommand: |
      echo "Installing dependencies..."
      npm ci --only=production
      echo "Building Strapi application..."
      npm run build
      echo "Generating TypeScript types..."
      npm run generate:types || true
      echo "Build completed successfully!"

# Health Check Configuration
healthCheck:
  path: /api/health
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3
  successThreshold: 1

# Scaling Configuration
autoDeploy: true
branch: main
rootDir: backend/strapi

# Static Files Configuration
staticPublishPath: ./public
headers:
  - source: "**/*"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=31536000, immutable"
  - source: "/uploads/**/*"
    headers:
      - key: "Cache-Control" 
        value: "public, max-age=31536000"
  - source: "**/*.html"
    headers:
      - key: "Cache-Control"
        value: "no-cache"

# Security Configuration
routes:
  - source: "/admin/*"
    headers:
      - key: "X-Frame-Options"
        value: "SAMEORIGIN"
      - key: "X-Content-Type-Options"
        value: "nosniff"
      - key: "Referrer-Policy"
        value: "strict-origin-when-cross-origin"
  - source: "/api/*"
    headers:
      - key: "X-Content-Type-Options"
        value: "nosniff"
      - key: "X-Frame-Options"
        value: "DENY"

# Monitoring and Alerts
notifications:
  - type: failure
    target: email
  - type: success
    target: email

# Resource Limits
limits:
  memory: 1GB
  cpu: 0.5
  storage: 1GB