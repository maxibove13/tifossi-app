services:
  # Strapi Backend Service
  - type: web
    name: tifossi-strapi-backend
    env: node
    plan: starter
    rootDir: backend/strapi  # For monorepo - all paths relative to this
    branch: main  # Deploy from main branch
    autoDeployTrigger: manual  # Deployments triggered via GitHub Actions
    buildCommand: npm ci && npm run build
    startCommand: npm run start:debug
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_CLIENT
        sync: false
      - key: DATABASE_SSL
        sync: false
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        sync: false
      - key: CORS_ORIGINS
        value: https://tifossi.app,https://www.tifossi.app,https://admin.tifossi.app
      - key: UPLOAD_PROVIDER
        value: cloudinary
      - key: AUTH_RATE_LIMIT_ENABLED
        value: true
      - key: AUTH_RATE_LIMIT_MAX
        value: 5
      - key: AUTH_RATE_LIMIT_DURATION
        value: 60000
      - key: FEATURE_PAYMENTS_ENABLED
        value: true
      - key: FEATURE_EMAIL_NOTIFICATIONS
        value: false
      - key: ADMIN_PANEL_ENABLED
        value: true
      - key: API_DOCUMENTATION_ENABLED
        value: false
      - key: STRAPI_TELEMETRY_DISABLED
        value: true
      - key: GRACEFUL_SHUTDOWN_TIMEOUT
        value: 30000
      - key: MAX_REQUEST_SIZE
        value: 50mb
      - key: UPLOAD_SIZE_LIMIT
        value: 200000000
      - key: HEALTH_CHECK_ENABLED
        value: true
      - key: HEALTH_CHECK_PATH
        value: /api/health
      - key: DEFAULT_CURRENCY
        value: UYU
      - key: DEFAULT_LOCALE
        value: es
      - key: SUPPORTED_LOCALES
        value: es,en,pt
      - key: BUSINESS_NAME
        value: "Tifossi Sport"
      - key: BUSINESS_EMAIL
        value: info@tifossi.com

  # Redis Cache (Optional - using Valkey)
  - type: keyvalue
    name: tifossi-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Required field - empty array allows all IPs

databases:
  # PostgreSQL Database
  - name: tifossi_postgres
    plan: free  # Free tier - expires after 30 days, upgrade to basic-1gb for production
    # Note: Storage size is configured via Render Dashboard, not in YAML
    # Free tier: 1GB, Paid: multiples of 5GB at $0.30/GB/month

# Environment Variables for External Services
# These are synced automatically via CI/CD from GitHub Secrets
#
# Required Environment Variables (Synced via CI/CD):
# - DATABASE_URL (external connection string from Render PostgreSQL)
# - DATABASE_CLIENT (postgres)
# - DATABASE_SSL (true for Render)
# - DATABASE_SSL_REJECT_UNAUTHORIZED (false for Render)
# - CLOUDINARY_NAME (from Cloudinary account)
# - CLOUDINARY_KEY (from Cloudinary account)
# - CLOUDINARY_SECRET (from Cloudinary account)
# - MP_TEST_ACCESS_TOKEN (test MercadoPago token)
# - MP_TEST_PUBLIC_KEY (test MercadoPago public key)
# - MP_WEBHOOK_SECRET (webhook secret for MercadoPago)
# - WEBHOOK_URL (webhook callback URL)
#
# Optional Environment Variables (Manual configuration via Render Dashboard):
# - MERCADO_PAGO_ACCESS_TOKEN (production MercadoPago token)
# - MERCADO_PAGO_PUBLIC_KEY (production MercadoPago public key)
# - SMTP_HOST (email service host)
# - SMTP_PORT (email service port)
# - SMTP_USERNAME (email service username)
# - SMTP_PASSWORD (email service password)
# - EMAIL_FROM (sender email address)
# - EMAIL_REPLY_TO (reply-to email address)
# - SENTRY_DSN (optional - for error monitoring)
# - REDIS_URL (auto-generated if using Redis service)