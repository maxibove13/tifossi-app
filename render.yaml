services:
  # Strapi Backend Service
  - type: web
    name: tifossi-strapi-backend
    env: node
    plan: starter
    rootDir: backend/strapi # For monorepo - all paths relative to this
    branch: main # Deploy from main branch
    autoDeployTrigger: manual # Deployments triggered via GitHub Actions
    buildCommand: npm ci && npm run build
    startCommand: npm run start:debug
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_CLIENT
        sync: false
      - key: DATABASE_SSL
        sync: false
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        sync: false
      - key: CORS_ORIGINS
        value: https://tifossi.app,https://www.tifossi.app,https://admin.tifossi.app
      - key: UPLOAD_PROVIDER
        value: cloudinary
      - key: AUTH_RATE_LIMIT_ENABLED
        value: true
      - key: AUTH_RATE_LIMIT_MAX
        value: 5
      - key: AUTH_RATE_LIMIT_DURATION
        value: 60000
      - key: FEATURE_EMAIL_NOTIFICATIONS
        value: false
      - key: ADMIN_PANEL_ENABLED
        value: true
      - key: API_DOCUMENTATION_ENABLED
        value: false
      - key: STRAPI_TELEMETRY_DISABLED
        value: true
      - key: GRACEFUL_SHUTDOWN_TIMEOUT
        value: 30000
      - key: MAX_REQUEST_SIZE
        value: 50mb
      - key: UPLOAD_SIZE_LIMIT
        value: 200000000
      - key: HEALTH_CHECK_ENABLED
        value: true
      - key: HEALTH_CHECK_PATH
        value: /api/health
      - key: DEFAULT_CURRENCY
        value: UYU
      - key: DEFAULT_LOCALE
        value: es
      - key: SUPPORTED_LOCALES
        value: es,en,pt
      - key: BUSINESS_NAME
        value: 'Tifossi Sport'
      - key: BUSINESS_EMAIL
        value: info@tifossi.com
      - key: BUSINESS_LEGAL_NAME
        value: 'TODO: Full legal business name (e.g., Tifossi Sport S.A.)'
      - key: BUSINESS_ADDRESS
        value: 'TODO: Complete business address (Street, City, Country)'
      - key: PRIVACY_CONTACT_EMAIL
        value: info@tifossi.com
      - key: IS_PROXIED
        value: true
      - key: PUBLIC_URL
        sync: false
      # MercadoPago Payment Configuration
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
      - key: MP_TEST_ACCESS_TOKEN
        sync: false
      - key: MP_TEST_PUBLIC_KEY
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: WEBHOOK_URL
        sync: false
      # Mobile App Configuration
      - key: APP_SCHEME
        value: tifossi

  # Redis Cache (Optional - using Valkey)
  - type: keyvalue
    name: tifossi-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # Required field - empty array allows all IPs

databases:
  # PostgreSQL Database
  - name: tifossi_postgres
    plan: free # Free tier - expires after 30 days, upgrade to basic-1gb for production
    # Note: Storage size is configured via Render Dashboard, not in YAML
    # Free tier: 1GB, Paid: multiples of 5GB at $0.30/GB/month
# Environment Variables for External Services
# These must be configured manually via Render Dashboard → Service Settings → Environment
#
# REQUIRED Environment Variables (Must be configured in Render Dashboard):
# - DATABASE_URL (external connection string from Render PostgreSQL)
# - DATABASE_CLIENT (postgres)
# - DATABASE_SSL (true for Render)
# - DATABASE_SSL_REJECT_UNAUTHORIZED (false for Render)
# - PUBLIC_URL (your Render service URL, e.g., https://tifossi-strapi-backend.onrender.com)
# - CLOUDINARY_NAME (from Cloudinary account)
# - CLOUDINARY_KEY (from Cloudinary account)
# - CLOUDINARY_SECRET (from Cloudinary account)
#
# MercadoPago Environment Variables (defined above, values set in Render Dashboard):
# - MP_ACCESS_TOKEN (production token - starts with APP-)
# - MP_PUBLIC_KEY (production key - starts with APP-)
# - MP_TEST_ACCESS_TOKEN (test token - starts with TEST-)
# - MP_TEST_PUBLIC_KEY (test key - starts with TEST-)
# - MP_WEBHOOK_SECRET (webhook secret for signature verification)
# - WEBHOOK_URL (https://tifossi-strapi-backend.onrender.com/api/webhooks/mercadopago)
# - APP_SCHEME (tifossi - already set as value)
#
# REQUIRED Firebase Admin Credentials (Choose ONE option):
# Option 1 (Recommended):
#   - FIREBASE_SERVICE_ACCOUNT_KEY (full JSON from Firebase Console)
# Option 2 (Individual fields):
#   - FIREBASE_PROJECT_ID (from Firebase Console)
#   - FIREBASE_PRIVATE_KEY (from service account JSON, escape newlines as \n)
#   - FIREBASE_CLIENT_EMAIL (from service account JSON)
#
# To get Firebase credentials:
# 1. Go to Firebase Console → Project Settings → Service Accounts
# 2. Click "Generate new private key" and download JSON
# 3. Add to Render Dashboard (escape newlines in private key with \n)
#
# Optional Environment Variables (Manual configuration via Render Dashboard):
# - MERCADO_PAGO_ACCESS_TOKEN (production MercadoPago token)
# - MERCADO_PAGO_PUBLIC_KEY (production MercadoPago public key)
# - SMTP_HOST (email service host)
# - SMTP_PORT (email service port)
# - SMTP_USERNAME (email service username)
# - SMTP_PASSWORD (email service password)
# - EMAIL_FROM (sender email address)
# - EMAIL_REPLY_TO (reply-to email address)
# - SENTRY_DSN (optional - for error monitoring)
# - REDIS_URL (auto-generated if using Redis service)
