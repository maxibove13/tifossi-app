services:
  # Strapi Backend Service
  - type: web
    name: tifossi-strapi-backend
    env: node
    plan: starter
    rootDir: backend/strapi  # For monorepo - all paths relative to this
    branch: main  # Deploy from main branch
    autoDeployTrigger: commit  # Auto-deploy on push to main
    buildCommand: npm ci && npm run build
    startCommand: npm run start:debug
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tifossi-postgres
          property: connectionString
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_SSL
        value: true
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: false
      - key: CORS_ORIGINS
        value: https://tifossi.app,https://www.tifossi.app,https://admin.tifossi.app
      - key: UPLOAD_PROVIDER
        value: cloudinary
      - key: RATE_LIMIT_ENABLED
        value: true
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: LOG_LEVEL
        value: warn
      - key: LOG_FORMAT
        value: json
      - key: LOG_FILE_ENABLED
        value: true
      - key: FEATURE_PAYMENTS_ENABLED
        value: true
      - key: FEATURE_EMAIL_NOTIFICATIONS
        value: true
      - key: ADMIN_PANEL_ENABLED
        value: true
      - key: API_DOCUMENTATION_ENABLED
        value: false
      - key: STRAPI_TELEMETRY_DISABLED
        value: true
      - key: GRACEFUL_SHUTDOWN_TIMEOUT
        value: 30000
      - key: MAX_REQUEST_SIZE
        value: 50mb
      - key: UPLOAD_SIZE_LIMIT
        value: 200000000
      - key: HEALTH_CHECK_ENABLED
        value: true
      - key: HEALTH_CHECK_PATH
        value: /api/health
      - key: DEFAULT_CURRENCY
        value: UYU
      - key: DEFAULT_LOCALE
        value: es
      - key: SUPPORTED_LOCALES
        value: es,en,pt
      - key: BUSINESS_NAME
        value: "Tifossi Sport"
      - key: BUSINESS_EMAIL
        value: info@tifossi.com

  # Redis Cache (Optional - using Valkey)
  - type: keyvalue
    name: tifossi-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Required field - empty array allows all IPs

databases:
  # PostgreSQL Database
  - name: tifossi-postgres
    plan: free  # Free tier - expires after 30 days, upgrade to basic-1gb for production
    # Note: Storage size is configured via Render Dashboard, not in YAML
    # Free tier: 1GB, Paid: multiples of 5GB at $0.30/GB/month

# Environment Variables for External Services
# These need to be configured manually in Render dashboard
#
# Required Environment Variables:
# - DATABASE_URL (auto-generated by Render PostgreSQL service)
# - CLOUDINARY_NAME (from Cloudinary account)
# - CLOUDINARY_KEY (from Cloudinary account)
# - CLOUDINARY_SECRET (from Cloudinary account)
# - MERCADO_PAGO_ACCESS_TOKEN (production MercadoPago token)
# - MERCADO_PAGO_PUBLIC_KEY (production MercadoPago public key)
# - MERCADO_PAGO_WEBHOOK_SECRET (webhook secret for MercadoPago)
# - SMTP_HOST (email service host)
# - SMTP_PORT (email service port)
# - SMTP_USERNAME (email service username)
# - SMTP_PASSWORD (email service password)
# - EMAIL_FROM (sender email address)
# - EMAIL_REPLY_TO (reply-to email address)
# - SENTRY_DSN (optional - for error monitoring)
# - REDIS_URL (auto-generated if using Redis service)